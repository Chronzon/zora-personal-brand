services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./laravel-backend
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      APP_NAME: "Personal Branding API"
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${LARAVEL_APP_KEY:-base64:/LFxv3rcoviRnyL3mHJ2jnjCS3u1oa42+CWD9VRIGRM=}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: personal_branding_app
      DB_USERNAME: personal_branding_app
      DB_PASSWORD: personal_branding_app
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      AI_PROVIDER: ${AI_PROVIDER:-local}
      AI_MODEL: ${AI_MODEL:-}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: personal_branding_app
      MYSQL_USER: personal_branding_app
      MYSQL_PASSWORD: personal_branding_app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3307:3306"

volumes:
  mysql-data:
