server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    location = /main.dart.js {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "no-store";
    }

    location = /flutter.js {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "no-store";
    }

    location = /flutter_service_worker.js {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "no-store";
    }

    location = /version.json {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "no-store";
    }

    location = /assets/.env {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "no-store";
    }

    location ~* \.(?:css|wasm|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
